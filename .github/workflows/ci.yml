name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    markdown-lint:
        name: Markdown Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
            - run: npm ci
            - run: npm run lint

    check-links:
        name: Check Links
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Check external links
              uses: lycheeverse/lychee-action@v2
              with:
                  args: --no-progress --exclude 'localhost' --exclude 'claude\.ai' '**/*.md'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

