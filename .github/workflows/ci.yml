name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    markdown-lint:
        name: Markdown Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
            - run: npm ci
            - run: npm run lint

    check-links:
        name: Check Links
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Check external links
              uses: lycheeverse/lychee-action@v2
              with:
                  args: --no-progress --exclude 'localhost' --exclude 'claude\.ai' '**/*.md' '**/*.json'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    skill-structure:
        name: Verify Skill Structure
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Check SKILL.md existence
              run: |
                  for dir in skills/team-*/ skills/using-team-skills/; do
                    name=$(basename "$dir")
                    if [ ! -f "$dir/SKILL.md" ]; then
                      echo "❌ $name: missing SKILL.md"
                      exit 1
                    fi
                    echo "✅ $name: SKILL.md exists"
                  done
            - name: Check required sections in SKILL.md
              run: |
                  REQUIRED=("角色定位" "系统提示词" "思维链" "Iron Law" "执行步骤" "自检门禁" "完成标志" "Red Flags")
                  for dir in skills/team-*/ skills/using-team-skills/; do
                    name=$(basename "$dir")
                    for section in "${REQUIRED[@]}"; do
                      if ! grep -q "^## $section" "$dir/SKILL.md" 2>/dev/null; then
                        if ! grep -q "^### $section" "$dir/SKILL.md" 2>/dev/null; then
                          echo "❌ $name: missing section '$section'"
                          exit 1
                        fi
                      fi
                    done
                    echo "✅ $name: all required sections present"
                  done

    shared-rules:
        name: Verify Shared Rules
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Check _team-rules integrity
              run: |
                  REQUIRED=("constitutional-rules.md" "verification-protocol.md" "four-state-protocol.md")
                  for file in "${REQUIRED[@]}"; do
                    if [ ! -f "skills/_team-rules/$file" ]; then
                      echo "❌ Missing _team-rules/$file"
                      exit 1
                    fi
                    echo "✅ _team-rules/$file exists"
                  done
