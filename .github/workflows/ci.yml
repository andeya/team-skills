name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
            - run: npm ci
            - run: npm run lint

    cli-test:
        name: CLI Smoke Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
            - run: npm ci
            - run: npm run cli-test
            - run: node bin/team-skills.js init --dry-run /tmp/test-project

    check-links:
        name: Check Links
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Check external links
              uses: lycheeverse/lychee-action@v2
              with:
                  args: --no-progress --exclude 'localhost' --exclude 'claude\.ai' '**/*.md'
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    publish:
        name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        needs: [lint, cli-test, check-links]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: '18'
                  registry-url: https://registry.npmjs.org
            - run: npm ci
            - run: npm publish
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
